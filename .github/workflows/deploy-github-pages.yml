name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          # GitHub Project Pages are served at `/<repo-name>/`, so we must prefix asset URLs accordingly.
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking ./out exists..."
          ls -la ./out
          test -f ./out/.nojekyll

      - name: Deploy `out/` to `main/docs`
        uses: peaceiris/actions-gh-pages@v4
        if: github.actor != 'github-actions[bot]'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: main
          destination_dir: docs
          enable_jekyll: false

